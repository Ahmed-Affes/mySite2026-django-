{% load static %}
<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Application{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/base_v2.css' %}">
</head>
<body class="dashboard-body">
<div class="dashboard-layout">
<aside class="dashboard-sidebar">
    <div class="sidebar-inner">
        <a class="navbar-brand" href="{% url 'launcher' %}">
            <span class="brand-icon"><i class="fas fa-rocket"></i></span>
            <span class="text-gradient">App Hub</span>
        </a>
        <div class="sidebar-nav">
            <ul class="navbar-nav w-100">
                <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Magasin</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blood_home' %}">BloodConnect</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'admin:index' %}">Admin</a></li>
            </ul>
        </div>
    </div>
</aside>
<div class="dashboard-main">
<div class="container py-4">
    {% block content %}{% endblock content %}
</div> <!-- container -->
</div> <!-- dashboard-main -->
</div> <!-- dashboard-layout -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
